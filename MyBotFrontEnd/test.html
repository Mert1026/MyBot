<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Is JavaScript Working?</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0a0e27;
            color: white;
        }
        .test-box {
            background: #1a1f3a;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border: 2px solid #00d4ff;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        button {
            background: #00d4ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0099cc;
        }
    </style>
</head>
<body>
    <h1>🧪 JavaScript Test Page</h1>
    
    <div class="test-box">
        <h2>Test 1: Basic JavaScript</h2>
        <p id="test1">❌ JavaScript NOT working</p>
    </div>

    <div class="test-box">
        <h2>Test 2: Button Click</h2>
        <button onclick="testButton()">Click Me</button>
        <p id="test2"></p>
    </div>

    <div class="test-box">
        <h2>Test 3: Server Check</h2>
        <p id="test3">Checking...</p>
    </div>

    <div class="test-box">
        <h2>Test 4: File Loading</h2>
        <p>Can you see this page at <strong>http://localhost:8000/test.html</strong>?</p>
        <p id="urlCheck"></p>
    </div>

    <script>
        // Test 1: Basic JS
        document.getElementById('test1').innerHTML = '✅ JavaScript IS working!';
        document.getElementById('test1').className = 'success';

        // Test 2: Button
        function testButton() {
            document.getElementById('test2').innerHTML = '✅ Button click works!';
            document.getElementById('test2').className = 'success';
        }

        // Test 3: Server
        if (window.location.protocol === 'file:') {
            document.getElementById('test3').innerHTML = '❌ You opened the file directly. You MUST use a server!<br>Run: <code>http-server -p 8000</code> in Command Prompt';
            document.getElementById('test3').className = 'error';
        } else {
            document.getElementById('test3').innerHTML = '✅ Server is running correctly at: ' + window.location.href;
            document.getElementById('test3').className = 'success';
        }

        // Test 4: URL Check
        document.getElementById('urlCheck').innerHTML = 'Current URL: <strong>' + window.location.href + '</strong>';
        if (window.location.href.includes('localhost') || window.location.href.includes('127.0.0.1')) {
            document.getElementById('urlCheck').className = 'success';
        } else {
            document.getElementById('urlCheck').className = 'error';
        }

        // Log to console
        console.log('✅ Console logging works!');
        console.log('Location:', window.location.href);
    </script>
</body>
</html>
