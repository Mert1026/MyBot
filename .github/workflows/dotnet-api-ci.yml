name: .NET Core API CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore MyBotApi/MyBotApi.slnx

    - name: Build
      run: dotnet build MyBotApi/MyBotApi.slnx --no-restore -c Release

    - name: Test
      run: dotnet test MyBotApi/MyBotApi.slnx --no-build -c Release --verbosity normal
